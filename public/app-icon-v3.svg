<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- V3: 1パネル集約版
       2枚を少しずらして重ね、前面パネルに細い白線アクセントを追加。
       小サイズでの記号強度を最大化。 -->

  <!-- iOS squircle background -->
  <rect width="1024" height="1024" rx="230" fill="#EDEAE4"/>

  <!-- Back panel: stone, tight offset -->
  <rect x="456" y="330" width="210" height="358" rx="18"
        fill="#BAB4AE"
        transform="rotate(6 561 509)"/>

  <!-- Front panel: charcoal -->
  <rect x="358" y="310" width="250" height="410" rx="24"
        fill="#1D1B19"
        transform="rotate(-4 483 515)"/>

  <!-- Subtle top-edge highlight line on front panel (gives depth without gradient) -->
  <rect x="358" y="310" width="250" height="3" rx="1.5"
        fill="#FFFFFF" fill-opacity="0.10"
        transform="rotate(-4 483 515)"/>
</svg>
